  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

election { background: #F77025; color: #F5EFE4; }\n  @keyframes csFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes csRise { from { opacity: 0; transform: translateY(22px) scale(.985); } to { opacity: 1; transform: translateY(0) scale(1); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height: 100vh; background: #F5EFE4; color: #0E1F3F; font-family: 'Spectral', Georgia, serif; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; position: relative;\">\n\n  <a href=\"https://mediasolutionsglobal.sharepoint.com/:b:/s/GMSWebsiteGoogleSEM/IQDb73pE20wbR7EAv7mNBVdFAdqhCNYQHQRhJ28oxPXF5kA?e=8k4p5K\" target=\"_blank\" rel=\"noopener\" title=\"Read how the quiz is designed — the scoring logic and rationale\" style=\"position: fixed; right: 22px; bottom: 22px; z-index: 50; display: inline-flex; align-items: center; gap: 9px; padding: 10px 16px 10px 13px; border-radius: 999px; border: 1.5px solid rgba(14,31,63,0.18); background: rgba(252,248,240,0.9); backdrop-filter: blur(6px); color: #0E1F3F; text-decoration: none; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; box-shadow: 0 6px 18px rgba(14,31,63,0.1); transition: border-color .18s ease, color .18s ease, transform .18s ease;\" style-hover=\"border-color: #F77025; color: #F77025; transform: translateY(-2px);\">\n    <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex: 0 0 auto;\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"><\u002Fpath><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\"><\u002Fpath><\u002Fsvg>\n    <span>The design manual<\u002Fspan>\n  <\u002Fa>\n\n  <sc-if value=\"{{ isCover }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width: 660px; width: 100%; text-align: center; animation: csRise .7s ease both;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #F77025; margin-bottom: 34px;\">An inquiry into character &nbsp;·&nbsp; №&nbsp;01<\u002Fdiv>\n      <div style=\"width: 44px; height: 3px; background: #F77025; margin: 0 auto 30px;\"><\u002Fdiv>\n      <h1 style=\"font-weight: 500; font-size: clamp(52px, 8vw, 88px); line-height: 0.98; letter-spacing: -0.02em; margin: 0 0 22px;\">The Character<br>Study<\u002Fh1>\n      <p style=\"font-style: italic; font-weight: 300; font-size: clamp(19px, 2.4vw, 24px); line-height: 1.5; color: rgba(14,31,63,0.66); margin: 0 auto 40px; max-width: 460px;\">A short, quiet inquiry into how you move through the world — the small choices that reveal what you actually believe.<\u002Fp>\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.12em; color: rgba(14,31,63,0.5); margin-bottom: 40px;\">Twelve questions &nbsp;·&nbsp; About four minutes &nbsp;·&nbsp; Entirely about you<\u002Fdiv>\n      <button sc-camel-on-click=\"{{ onBegin }}\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500; color: #F5EFE4; background: #0E1F3F; border: none; padding: 18px 40px; border-radius: 999px; cursor: pointer; transition: transform .18s ease, background .18s ease;\" style-hover=\"background: #F77025; transform: translateY(-2px);\">Begin the inquiry<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width: 720px; width: 100%; animation: csFade .5s ease both;\">\n      <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.14em; color: rgba(14,31,63,0.55);\">\n        <span>Question {{ qNumber }} <span style=\"opacity: .5;\">/ {{ qTotal }}<\u002Fspan><\u002Fspan>\n        <span style=\"text-transform: uppercase; letter-spacing: 0.2em; opacity: .7;\">The Character Study<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"height: 3px; width: 100%; background: rgba(14,31,63,0.12); border-radius: 999px; overflow: hidden; margin-bottom: 46px;\">\n        <div style=\"height: 100%; width: {{ progressWidth }}; background: #F77025; border-radius: 999px; transition: width .5s cubic-bezier(.22,.61,.36,1);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <h2 style=\"font-weight: 400; font-size: clamp(28px, 4.2vw, 42px); line-height: 1.18; letter-spacing: -0.015em; margin: 0 0 40px; text-wrap: pretty;\">{{ questionText }}<\u002Fh2>\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <sc-for list=\"{{ options }}\" as=\"option\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ option.onClick }}\" style=\"display: flex; gap: 18px; align-items: center; text-align: left; width: 100%; padding: 20px 22px; border-radius: 13px; border: 1.5px solid {{ option.borderColor }}; background: {{ option.bg }}; cursor: pointer; font-family: 'Spectral', Georgia, serif; transition: transform .16s ease, border-color .16s ease, background .16s ease;\" style-hover=\"transform: translateX(4px); border-color: #F77025;\">\n            <span style=\"flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; background: {{ option.badgeBg }}; color: {{ option.badgeColor }}; transition: background .16s ease, color .16s ease;\">{{ option.letter }}<\u002Fspan>\n            <span style=\"font-size: clamp(17px, 2.1vw, 20px); line-height: 1.4; color: #0E1F3F;\">{{ option.text }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display: flex; justify-content: space-between; align-items: center; margin-top: 34px;\">\n        <sc-if value=\"{{ canBack }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ onBack }}\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(14,31,63,0.55); background: none; border: none; cursor: pointer; padding: 6px 0;\" style-hover=\"color: #F77025;\">← Back<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showContinue }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ onContinue }}\" style=\"margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; color: #F5EFE4; background: #0E1F3F; border: none; padding: 12px 26px; border-radius: 999px; cursor: pointer;\" style-hover=\"background: #F77025;\">Continue →<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isReveal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width: 620px; width: 100%; text-align: center; animation: csRise .7s ease both;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #F77025; margin-bottom: 30px;\">Now, the reveal<\u002Fdiv>\n      <h2 style=\"font-weight: 400; font-size: clamp(32px, 5vw, 52px); line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 26px; text-wrap: pretty;\">It was never really about the wallet.<\u002Fh2>\n      <p style=\"font-style: italic; font-weight: 300; font-size: clamp(18px, 2.3vw, 22px); line-height: 1.55; color: rgba(14,31,63,0.68); margin: 0 auto 42px; max-width: 480px;\">Every choice you just made points to a conviction — one of the beliefs at the heart of how we work here. Here is the one you live most naturally.<\u002Fp>\n      <button sc-camel-on-click=\"{{ onReveal }}\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500; color: #F5EFE4; background: #0E1F3F; border: none; padding: 18px 40px; border-radius: 999px; cursor: pointer; transition: transform .18s ease, background .18s ease;\" style-hover=\"background: #F77025; transform: translateY(-2px);\">Meet your type<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isResult }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width: 760px; width: 100%; animation: csRise .7s ease both;\">\n\n      <div style=\"text-align: center; margin-bottom: 42px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #F77025; margin-bottom: 26px;\">The GMS Way &nbsp;·&nbsp; Your type<\u002Fdiv>\n        <div style=\"width: 96px; height: 96px; border-radius: 50%; background: #F77025; display: flex; align-items: center; justify-content: center; margin: 0 auto 22px; box-shadow: 0 12px 30px rgba(247,112,37,0.28);\">\n          <span style=\"font-family: 'Spectral', Georgia, serif; font-weight: 500; font-size: 46px; color: #F5EFE4;\">{{ avatarMono }}<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-weight: 500; font-size: clamp(42px, 6.5vw, 72px); line-height: 1; letter-spacing: -0.02em; margin: 0 0 14px;\">{{ avatarName }}<\u002Fh1>\n        <p style=\"font-style: italic; font-weight: 400; font-size: clamp(19px, 2.5vw, 25px); color: #F77025; margin: 0;\">“{{ avatarTagline }}”<\u002Fp>\n      <\u002Fdiv>\n\n      <p style=\"font-size: clamp(18px, 2.2vw, 21px); line-height: 1.62; color: rgba(14,31,63,0.82); margin: 0 0 40px; text-align: center; text-wrap: pretty;\">{{ avatarEssence }}<\u002Fp>\n\n      <div style=\"height: 1px; background: rgba(14,31,63,0.14); margin: 0 0 40px;\"><\u002Fdiv>\n\n      <div style=\"text-align: center; margin-bottom: 44px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(14,31,63,0.5); margin-bottom: 16px;\">The conviction you live most naturally<\u002Fdiv>\n        <div style=\"font-weight: 400; font-size: clamp(24px, 3.6vw, 36px); line-height: 1.22; letter-spacing: -0.01em; color: #0E1F3F; max-width: 620px; margin: 0 auto; text-wrap: balance;\">“{{ avatarConvictionHeading }}”<\u002Fdiv>\n        <sc-if value=\"{{ isSecondary }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-style: italic; font-weight: 300; font-size: clamp(15px, 1.9vw, 18px); color: rgba(14,31,63,0.6); margin-top: 16px;\">{{ avatarSecondary }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;\">\n        <div style=\"background: #FCF8F0; border: 1.5px solid rgba(14,31,63,0.12); border-radius: 15px; padding: 26px 26px;\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #F77025; margin-bottom: 16px;\">Where you're strong<\u002Fdiv>\n          <ul style=\"margin: 0; padding-left: 18px; display: flex; flex-direction: column; gap: 10px;\">\n            <sc-for list=\"{{ avatarStrengths }}\" as=\"item\" hint-placeholder-count=\"3\">\n              <li style=\"font-size: 17px; line-height: 1.42; color: rgba(14,31,63,0.85);\">{{ item }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background: #FCF8F0; border: 1.5px solid rgba(14,31,63,0.12); border-radius: 15px; padding: 26px 26px;\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(14,31,63,0.5); margin-bottom: 16px;\">Your growing edges<\u002Fdiv>\n          <ul style=\"margin: 0; padding-left: 18px; display: flex; flex-direction: column; gap: 10px;\">\n            <sc-for list=\"{{ avatarGrowth }}\" as=\"item\" hint-placeholder-count=\"2\">\n              <li style=\"font-size: 17px; line-height: 1.42; color: rgba(14,31,63,0.85);\">{{ item }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: #FDF0E4; border-left: 4px solid #F77025; border-radius: 4px 15px 15px 4px; padding: 28px 30px; margin-bottom: 46px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #F77025; margin-bottom: 14px;\">How you show up here<\u002Fdiv>\n        <p style=\"margin: 0; font-size: clamp(17px, 2.1vw, 20px); line-height: 1.56; color: #0E1F3F; text-wrap: pretty;\">{{ avatarAtGMS }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"height: 1px; background: rgba(14,31,63,0.14); margin: 6px 0 40px;\"><\u002Fdiv>\n      <div style=\"text-align: center; margin-bottom: 28px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #F77025; margin-bottom: 12px;\">The GMS Way, in full<\u002Fdiv>\n        <h3 style=\"font-weight: 400; font-size: clamp(26px, 3.8vw, 38px); line-height: 1.15; letter-spacing: -0.015em; margin: 0 0 12px; color: #0E1F3F;\">Seven convictions. Seven characters.<\u002Fh3>\n        <p style=\"font-style: italic; font-weight: 300; font-size: clamp(16px, 2vw, 19px); line-height: 1.5; color: rgba(14,31,63,0.62); max-width: 500px; margin: 0 auto;\">Your type is the one you live most naturally — but the whole belief is yours to build within. Here is each conviction and the character who embodies it — click any of them to read it in the original words of The GMS Way.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: {{ typesGridCols }}; gap: 16px; align-items: start; margin-bottom: 46px;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n          <sc-for list=\"{{ allTypes }}\" as=\"type\" hint-placeholder-count=\"7\">\n            <button sc-camel-on-click=\"{{ type.onToggle }}\" style=\"display: flex; gap: 16px; align-items: flex-start; text-align: left; width: 100%; padding: 18px 20px; border-radius: 14px; border: 1.5px solid {{ type.borderColor }}; background: {{ type.bg }}; cursor: pointer; font-family: 'Spectral', Georgia, serif; transition: border-color .16s ease, background .16s ease;\" style-hover=\"border-color: #F77025;\">\n              <span style=\"flex: 0 0 auto; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Spectral', Georgia, serif; font-weight: 500; font-size: 20px; background: {{ type.badgeBg }}; color: {{ type.badgeColor }};\">{{ type.mono }}<\u002Fspan>\n              <span style=\"flex: 1; min-width: 0; display: block;\">\n                <span style=\"display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 2px;\">\n                  <span style=\"font-weight: 500; font-size: clamp(18px, 2.2vw, 22px); color: #0E1F3F;\">{{ type.name }}<\u002Fspan>\n                  <sc-if value=\"{{ type.isMine }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; color: #F5EFE4; background: #F77025; padding: 3px 10px; border-radius: 999px;\">Your type<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fspan>\n                <span style=\"display: block; font-size: clamp(15px, 1.8vw, 17px); line-height: 1.4; color: #0E1F3F; margin: 6px 0 4px;\">“{{ type.statement }}”<\u002Fspan>\n                <sc-if value=\"{{ type.showExplain }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"display: block; font-size: 14.5px; line-height: 1.5; color: rgba(14,31,63,0.66); text-wrap: pretty;\">{{ type.explain }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fspan>\n              <span style=\"flex: 0 0 auto; font-family: 'IBM Plex Mono', monospace; font-size: 17px; color: #F77025; line-height: 1.2;\">{{ type.chevron }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasExpanded }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position: sticky; top: 24px; background: #FCF8F0; border: 1.5px solid #F77025; border-radius: 16px; padding: 26px 28px; max-height: calc(100vh - 48px); overflow: auto;\">\n            <div style=\"display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 4px;\">\n              <div>\n                <div style=\"font-family: 'Spectral', Georgia, serif; font-weight: 500; font-size: clamp(22px, 2.6vw, 27px); color: #0E1F3F;\">{{ expandedName }}<\u002Fdiv>\n                <div style=\"font-style: italic; font-size: 15px; color: rgba(14,31,63,0.55); margin-top: 2px;\">“{{ expandedTagline }}”<\u002Fdiv>\n              <\u002Fdiv>\n              <button sc-camel-on-click=\"{{ onCloseExpanded }}\" title=\"Close\" style=\"flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid rgba(14,31,63,0.2); background: none; color: #0E1F3F; font-family: 'IBM Plex Mono', monospace; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;\" style-hover=\"border-color: #F77025; color: #F77025;\">✕<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size: clamp(16px, 1.9vw, 18px); line-height: 1.4; color: #0E1F3F; margin: 10px 0 18px;\">“{{ expandedStatement }}”<\u002Fdiv>\n            <div style=\"height: 1px; background: rgba(14,31,63,0.14); margin-bottom: 16px;\"><\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: #F77025; margin-bottom: 12px;\">From The GMS Way — in the original words<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n              <sc-for list=\"{{ expandedParas }}\" as=\"para\" hint-placeholder-count=\"2\">\n                <p style=\"margin: 0; font-size: 15px; line-height: 1.62; color: rgba(14,31,63,0.8); text-wrap: pretty;\">{{ para.t }}<\u002Fp>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(14,31,63,0.45); text-align: center; margin-bottom: 14px;\">Screenshot this to share your type<\u002Fdiv>\n      <div style=\"background: #0E1F3F; border-radius: 20px; padding: 40px 36px; text-align: center; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(14,31,63,0.18);\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #F77025; margin-bottom: 26px;\">The GMS Way<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;\">{{ avatarArtSvg }}<\u002Fdiv>\n        <div style=\"font-family: 'Spectral', Georgia, serif; font-weight: 500; font-size: clamp(34px, 5vw, 48px); line-height: 1; color: #F5EFE4; margin-bottom: 14px;\">{{ avatarName }}<\u002Fdiv>\n        <div style=\"font-style: italic; font-weight: 300; font-size: clamp(16px, 2.1vw, 20px); color: rgba(245,239,228,0.72); margin-bottom: 28px;\">“{{ avatarShareLine }}”<\u002Fdiv>\n        <div style=\"height: 1px; width: 60px; background: rgba(245,239,228,0.25); margin: 0 auto 20px;\"><\u002Fdiv>\n        <img src=\"3759c8fa-8dda-4324-a13e-85fe959d9d27\" alt=\"GMS — Global Marketing Solutions\" style=\"height: 30px; width: auto; display: block; margin: 0 auto; opacity: 0.92;\">\n      <\u002Fdiv>\n\n      <div style=\"text-align: center;\">\n        <button sc-camel-on-click=\"{{ onRestart }}\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500; color: #0E1F3F; background: none; border: 1.5px solid rgba(14,31,63,0.25); padding: 15px 34px; border-radius: 999px; cursor: pointer; transition: border-color .18s ease, color .18s ease;\" style-hover=\"border-color: #F77025; color: #F77025;\">Take it again<\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;autoAdvance&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;showRevealBeat&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;shuffleOrder&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'cover', q: 0, answers: {}, order: null, expanded: null, manualOpen: false };\n\n  C = {\n    OWN:  { heading: 'We take responsibility for outcomes, not just deliverables', explain: \"Responsibility doesn't end at the edge of a job description. We look toward the problem, own the outcome, and act as if the result is ours — because to the people who count on us, it is.\" },\n    QUE:  { heading: 'We question the standard before we adopt it', explain: \"We don't accept a practice simply because it is standard. We ask whether it actually produces good work, and we're willing to break the model when it doesn't.\" },\n    FAIR: { heading: 'We believe in good business for everyone in the room', explain: \"Good business isn't zero-sum. We look for the arrangement where clients, suppliers and colleagues all do well — value created together, not extracted from one another.\" },\n    CARE: { heading: 'We care about our people as whole human beings', explain: \"People are more than their roles. What happens in a life doesn't stop at the office door, and a team that feels genuinely cared for does its best work.\" },\n    CUR:  { heading: 'We are relentlessly curious, and we share what we learn', explain: \"We stay curious on purpose and treat knowledge as something to give away. What one person learns, the whole team should get to keep.\" },\n    ETH:  { heading: 'We hold ourselves to a standard of ethics, always', explain: \"We hold a line that isn't for sale. Ethics is the floor, not the ceiling — we behave in a way we'd be proud to explain in full, with nothing left out.\" },\n    GLOB: { heading: 'We are global citizens', explain: \"We belong to a wider world. Difference has something to teach us, and we are made stronger by welcoming perspectives beyond our own.\" },\n  };\n\n  ORIG = {\n    OWN: [\n      \"Most agencies manage to their KPIs. We consider that a floor, not a ceiling. When something matters to a client's business — even if it sits outside our brief, outside our contract, outside what anyone would reasonably expect of us — we notice it, we say something, and more often than not we act. This is not altruism. It is the belief that our job is to care about the result, not to be insulated from it. A GMS person does not look away from a problem because it wasn't in the scope of work. They look toward it, because that is what a genuine partner does.\",\n      \"This kind of ownership is earned, not declared. It shows up in the small moments — flagging a risk before it becomes a problem, volunteering an observation the client didn't ask for, staying in the conversation when it would have been easier to step back. We are judged, ultimately, by whether clients' businesses are better for having worked with us. That is the standard we hold ourselves to.\",\n    ],\n    QUE: [\n      \"The advertising industry has many conventions. Some of them are excellent. Some of them exist because no one stopped to ask why. GMS does not adopt standard practice because it is standard. We adopt it because we have examined it, understood it, and concluded it is genuinely the best available approach for the situation in front of us. If it is not, we look for something better — even if that means doing something the industry does not typically do, or doing something entirely new.\",\n      \"This is not contrarianism. It is rigour. It is the discipline to ask 'is this actually good?' before asking 'is this what everyone does?' We respect knowledge and expertise wherever we find it, including in the conventions of our industry. But we are not bound by them. We are willing to break the model when the model is not producing good outcomes — for our clients, our suppliers, or our people. This intellectual independence is one of the most valuable things we offer.\",\n    ],\n    FAIR: [\n      \"The GMS Way is built on a simple premise: that the interests of our clients, our suppliers, our staff, and our business are not fundamentally in conflict — and that our job is to find the arrangement that serves all of them well. We do not win by extracting value from one party to give it to another. We win by creating conditions where everyone can do their best work and trust that they will be treated fairly.\",\n      \"Clients should believe — because it is true — that we are acting in their best interests. Suppliers should know — because we demonstrate it — that working with GMS means being treated as a genuine partner, not a line in a media plan. Our people should feel — because we build it this way — that the commercial success of this company and their own professional fulfilment are pointing in the same direction. There is no version of the GMS Way that works for the business but not for the people in it.\",\n    ],\n    CARE: [\n      \"What happens in someone's life does not stop at the office door. GMS understands that our people bring their whole selves to this work — their ambitions and their anxieties, their confidence and their doubts, the weight of what is happening outside work and the energy of what is going well. We do not ask anyone to pretend otherwise.\",\n      \"This means we take the professional development of our team seriously — not as an HR obligation but as a genuine investment in people we care about. It also means that when something in someone's life is making it hard for them to show up fully, we would rather know about it and respond with intelligence and compassion than hold a standard that ignores the person behind the role. A team that feels cared for performs better. More importantly, it is the right way to lead.\",\n    ],\n    CUR: [\n      \"A GMS person does not believe they have finished learning. They read, they ask questions, they test assumptions, they pay attention to what is changing and think about what it means. This curiosity is not a personality type — it is a professional commitment. The industry we work in moves quickly. The clients we serve operate in markets that move even faster. Staying current is not enough; we aspire to be ahead.\",\n      \"But knowledge kept to oneself is only half as valuable as knowledge shared. One of the ways the GMS Way shows up in daily practice is in the expectation that people bring what they are learning back to the team — in WIPs, in briefings, in informal conversations, in the way they document and teach what they know. We believe the collective intelligence of this team is one of our greatest assets, and that it only compounds when people invest in each other's understanding.\",\n    ],\n    ETH: [\n      \"The GMS Way only works if it is grounded in integrity. We will not pursue commercial outcomes at the cost of honest dealing. We will not recommend something to a client because it is profitable for us if we do not believe it is right for them. We will not make commitments we do not intend to keep. We will not build a culture that rewards results over the means used to achieve them.\",\n      \"This is not about compliance. Compliance is the minimum. The GMS standard is to behave in a way that we would be proud to explain to anyone — clients, suppliers, staff, competitors — in full, with nothing omitted. Ethics is not a constraint on good business at GMS. It is the foundation of it.\",\n    ],\n    GLOB: [\n      \"The world that a GMS person inhabits is larger than the city they work in, larger than the country they live in, larger than the markets their clients operate in today. We are interested in how people think and behave across cultures, in what different markets can teach each other, in the connections between ideas that seem unrelated until you look from a wider angle. This perspective makes us better at our work and, we believe, better as people.\",\n      \"Being a global citizen does not require international travel. It requires intellectual openness — a genuine interest in the world beyond your own immediate experience, and a willingness to let that interest change how you think. GMS is a company that welcomes difference, learns from it, and is made stronger by it.\",\n    ],\n  };\n\n  ART = {\n    OWN: ['M12 2a3 3 0 1 0 .01 0', 'M12 8v14', 'M5 12H2a10 10 0 0 0 20 0h-3'],\n    QUE: ['M12 2a10 10 0 1 0 .01 0', 'M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3', 'M12 17h.01'],\n    FAIR: ['M2 7c2.5 0 2.5 3 5 3s2.5-3 5-3 2.5 3 5 3 2.5-3 5-3', 'M2 12c2.5 0 2.5 3 5 3s2.5-3 5-3 2.5 3 5 3 2.5-3 5-3', 'M2 17c2.5 0 2.5 3 5 3s2.5-3 5-3 2.5 3 5 3 2.5-3 5-3'],\n    CARE: ['M7 20h10', 'M10 20c5.5-2.5.8-6.4 3-10', 'M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z', 'M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z'],\n    CUR: ['M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z', 'M15 5.764v15', 'M9 3.236v15'],\n    ETH: ['M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z'],\n    GLOB: ['M12 2a10 10 0 1 0 .01 0', 'M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20', 'M2 12h20'],\n  };\n\n  AVATARS = {\n    OWN: {\n      name: 'The Steward', mono: 'S',\n      tagline: 'You cannot walk past a loose thread.',\n      essence: \"You feel responsible for the whole, not just your piece of it. Where others see 'not my job,' you see a problem that still needs solving — and you're already reaching for it. Ownership isn't a weight you carry; it's simply how you see.\",\n      strengths: ['Sees the whole board, not just your square', 'Acts before being asked', 'Treats the outcome as personal'],\n      growth: ['Trusting others to carry the thread too', 'Not shouldering every weight alone'],\n      atGMS: \"You're the person who notices the risk before it becomes a problem and says something — who looks toward the problem that wasn't in the scope, because that's what a genuine partner does.\",\n      share: \"I can't walk past a loose thread.\",\n    },\n    QUE: {\n      name: 'The Heretic', mono: 'H',\n      tagline: 'Why is it done this way?',\n      essence: \"You have never accepted 'because that's how it's done' as an answer. You examine the rule before you follow it — not to rebel, but because you refuse to mistake habit for wisdom. When a convention earns its place, you honour it. When it doesn't, you build something better.\",\n      strengths: ['Genuine intellectual independence', 'Asks the question others skip', \"Unmoved by 'we've always done it this way'\"],\n      growth: ['Spotting which conventions are load-bearing', 'Choosing which battles to fight'],\n      atGMS: \"You're the rigour in the room — the one who asks 'is this actually good?' before 'is this what everyone does?', and who's willing to break the model when it isn't producing good outcomes.\",\n      share: 'I question the standard before I adopt it.',\n    },\n    FAIR: {\n      name: 'The Weaver', mono: 'W',\n      tagline: \"Everyone wins, or the deal isn't done.\",\n      essence: \"You instinctively look for the arrangement that serves everyone at the table. You don't believe one person's gain must be another's loss — you believe the better answer usually leaves the whole room better off. You're the one quietly making sure no one is being squeezed.\",\n      strengths: ['Finds win-win where others see trade-offs', 'Protects the people not in the room', 'Builds trust that compounds'],\n      growth: ['Accepting that some interests genuinely conflict', 'Naming your own stake in the deal'],\n      atGMS: \"You know we don't win by extracting value from one party to hand to another — we win by creating conditions where clients, suppliers, and people can all do their best work and trust they'll be treated fairly.\",\n      share: \"Everyone wins, or the deal isn't done.\",\n    },\n    CARE: {\n      name: 'The Gardener', mono: 'G',\n      tagline: 'People are not their roles.',\n      essence: \"You see the whole person — the one carrying something heavy today, the one quietly thriving. You know that what happens in a life doesn't stop at the office door, and you'd rather understand someone than hold them to a standard that ignores them. You tend the people around you, and they grow.\",\n      strengths: [\"Reads the room's emotional weather\", \"Invests in people's growth\", 'Leads with compassion'],\n      growth: ['Remembering to tend yourself too', 'Holding a standard and a heart at once'],\n      atGMS: 'You know a team that feels cared for performs better — and, more importantly, that caring for people as whole human beings is simply the right way to lead.',\n      share: 'People are not their roles.',\n    },\n    CUR: {\n      name: 'The Cartographer', mono: 'C',\n      tagline: 'You draw the map, then hand it over.',\n      essence: \"You are never finished learning. You read, you test assumptions, you follow a question just to see where it leads. But what makes you rare isn't the knowing — it's that you give it away. Knowledge kept to yourself, you believe, is only half as valuable.\",\n      strengths: ['Relentless, restless curiosity', 'Teaches by instinct', 'Connects ideas others keep apart'],\n      growth: ['Finishing one map before starting three', 'Letting others sit with a question'],\n      atGMS: \"You're why the collective intelligence of the team keeps compounding — bringing what you learn back in WIPs, briefings, and the everyday habit of teaching what you know.\",\n      share: 'I draw the map, then hand it over.',\n    },\n    ETH: {\n      name: 'The Lamplighter', mono: 'L',\n      tagline: \"Nothing you'd need to hide.\",\n      essence: \"You hold a line that isn't for sale. You won't recommend what's profitable if it isn't right; you won't make a promise you don't mean to keep. Your standard isn't compliance — compliance is the floor. It's behaving in a way you'd be proud to explain to anyone, in full, with nothing left out.\",\n      strengths: ['Unwavering integrity', 'The same in the light and the dark', 'Trusted absolutely'],\n      growth: ['Extending to others the grace you deny yourself', 'Assuming good faith first'],\n      atGMS: \"You know ethics isn't a constraint on good business — it's the foundation of it. You'd pursue no outcome at the cost of honest dealing.\",\n      share: \"Nothing I'd need to hide.\",\n    },\n    GLOB: {\n      name: 'The Voyager', mono: 'V',\n      tagline: \"The world is larger than the room you're in.\",\n      essence: \"Your curiosity crosses borders. You're interested in how people think and live across cultures, in what one market can teach another, in the connections between ideas that seem unrelated until you look from a wider angle. You welcome difference — and you let it change you.\",\n      strengths: ['Genuine intellectual openness', 'Sees the wider pattern', 'Makes difference a strength'],\n      growth: ['Grounding the big picture in the here and now', 'Turning perspective into action'],\n      atGMS: 'You bring the conviction that the world beyond our own immediate experience always has something to teach us — and that a company is made stronger by welcoming and learning from difference.',\n      share: \"The world is larger than the room I'm in.\",\n    },\n  };\n\n  QUESTIONS = [\n    { q: \"You're the last to leave a shared kitchen. Someone before you left a real mess — not yours, and nobody saw you come in.\", options: [\n      { t: \"Clean it. The next person shouldn't inherit someone else's mess.\", s: { OWN: 2, CARE: 1 } },\n      { t: 'Leave a kind note about tidying up — the habit is the real problem.', s: { QUE: 2 } },\n      { t: 'Clean exactly your share, and no more than your share.', s: { FAIR: 2 } },\n      { t: \"Wipe it down — whoever left it is clearly having a rough day.\", s: { CARE: 2 } },\n    ]},\n    { q: 'A rule has stood, unquestioned, for a hundred years. It causes no obvious harm, but nobody alive remembers why it exists.', options: [\n      { t: \"Trace it to its origin — I can't respect a rule I don't understand.\", s: { QUE: 2, CUR: 1 } },\n      { t: 'Ask who it might quietly be hurting today.', s: { ETH: 2, CARE: 1 } },\n      { t: 'Learn it well enough to explain it to whoever comes next.', s: { CUR: 2 } },\n      { t: 'Gather everyone to decide together whether it still serves us.', s: { FAIR: 2 } },\n    ]},\n    { q: 'Would you rather be known as someone who…', options: [\n      { t: '…can be trusted completely, by a few.', s: { ETH: 2, CARE: 1 } },\n      { t: '…is endlessly curious, and shares all of it.', s: { CUR: 2, GLOB: 1 } },\n      { t: '…makes sure everyone leaves the room better off.', s: { FAIR: 2 } },\n      { t: \"…gets it done, no matter whose job it was.\", s: { OWN: 2 } },\n    ]},\n    { q: 'Which statement rings most true to you?', options: [\n      { t: 'How you do something matters as much as what you produce.', s: { ETH: 2, OWN: 1 } },\n      { t: 'Most rules are just habits nobody has examined.', s: { QUE: 2 } },\n      { t: 'You never really finish learning.', s: { CUR: 2 } },\n      { t: 'No one is only their job.', s: { CARE: 2 } },\n    ]},\n    { q: 'If you could quietly change one thing about how society works:', options: [\n      { t: \"People owning problems they didn't personally cause.\", s: { OWN: 2 } },\n      { t: 'More borrowing of good ideas between cultures.', s: { GLOB: 2, CUR: 1 } },\n      { t: 'Fairer deals for those who never get a seat at the table.', s: { FAIR: 2, ETH: 1 } },\n      { t: 'More honesty, even when it costs something.', s: { ETH: 2 } },\n    ]},\n    { q: 'A stranger drops a £20 note in a busy street and walks on, unaware.', options: [\n      { t: 'Catch up and hand it back. No question.', s: { ETH: 2 } },\n      { t: 'Return it — then wonder why so many people just watched.', s: { CUR: 2, GLOB: 1 } },\n      { t: 'Return it, hoping someone would do the same for me.', s: { FAIR: 2, CARE: 1 } },\n      { t: \"Return it; I'd want them to have a better day.\", s: { CARE: 2 } },\n    ]},\n    { q: 'Given a free year and no obligations, you would rather:', options: [\n      { t: 'Live in five countries, learning how each one thinks.', s: { GLOB: 2, CUR: 1 } },\n      { t: 'Master one craft deeply enough to teach it.', s: { CUR: 2 } },\n      { t: 'Fix one problem in your own community, for good.', s: { OWN: 2, CARE: 1 } },\n      { t: 'Build something that leaves everyone in it better off.', s: { FAIR: 2 } },\n    ]},\n    { q: 'You find a shortcut that helps you and harms no one directly — but it only works because everyone else follows the rule you would be skipping.', options: [\n      { t: \"I won't. If I'd have to hide it, that's my answer.\", s: { ETH: 2 } },\n      { t: \"First I'd ask why the rule exists before deciding it's skippable.\", s: { QUE: 2 } },\n      { t: 'Only if the benefit could be shared with everyone, not just me.', s: { FAIR: 2 } },\n      { t: \"I'd flag it so the people it affects know about it.\", s: { CARE: 2, OWN: 1 } },\n    ]},\n    { q: \"At your very best, you're the one in the group who…\", options: [\n      { t: \"…notices the thing everyone's avoiding, and picks it up.\", s: { OWN: 2 } },\n      { t: '…asks the question no one else will.', s: { QUE: 2 } },\n      { t: '…makes sure the quietest person is actually heard.', s: { CARE: 2, FAIR: 1 } },\n      { t: '…brings back something nobody knew they needed to know.', s: { CUR: 2, GLOB: 1 } },\n    ]},\n    { q: 'Someone hands you a map of a place you have never been. Your first instinct:', options: [\n      { t: 'Improve it and pass it on — maps are meant to be shared.', s: { CUR: 2 } },\n      { t: 'Wonder whose paths the mapmaker chose to leave off.', s: { GLOB: 2, ETH: 1 } },\n      { t: \"Check that it's fair to everyone who'll rely on it.\", s: { FAIR: 2 } },\n      { t: 'Feel responsible for anyone following behind me on it.', s: { OWN: 2, CARE: 1 } },\n    ]},\n    { q: 'A long queue. Someone clearly in distress needs to go ahead. The unspoken rule is first-come, first-served.', options: [\n      { t: 'Wave them ahead and smooth over any grumbling. Someone should.', s: { OWN: 2, CARE: 1 } },\n      { t: 'Ask the queue — a fair exception is one everyone agrees to.', s: { FAIR: 2 } },\n      { t: 'Help them anyway. The rule serves people, not the reverse.', s: { CARE: 2, QUE: 1 } },\n      { t: \"Point out that the 'rule' was never really a rule.\", s: { QUE: 2 } },\n    ]},\n    { q: 'In the end, you would most want to be judged by:', options: [\n      { t: 'What you took responsibility for.', s: { OWN: 2 } },\n      { t: 'The questions you dared to ask.', s: { QUE: 2 } },\n      { t: 'Whether people were better for knowing you.', s: { CARE: 2, FAIR: 1 } },\n      { t: 'The integrity you kept when it cost you.', s: { ETH: 2 } },\n      { t: 'What you learned, and what you passed on.', s: { CUR: 2, GLOB: 1 } },\n    ]},\n  ];\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem('gms-character-study');\n      if (raw) {\n        const d = JSON.parse(raw);\n        if (d && d.screen) this.setState({ screen: d.screen, q: d.q || 0, answers: d.answers || {}, order: d.order || null });\n      }\n    } catch (e) {}\n  }\n\n  componentDidUpdate() {\n    try {\n      localStorage.setItem('gms-character-study', JSON.stringify({\n        screen: this.state.screen, q: this.state.q, answers: this.state.answers, order: this.state.order,\n      }));\n    } catch (e) {}\n  }\n\n  qList() {\n    const ord = this.state.order || this.QUESTIONS.map((_, i) => i);\n    return ord.map((i) => this.QUESTIONS[i]);\n  }\n\n  begin() {\n    let order = this.QUESTIONS.map((_, i) => i);\n    if (this.props.shuffleOrder) order = order.slice().sort(() => Math.random() - 0.5);\n    this.setState({ screen: 'quiz', q: 0, answers: {}, order });\n  }\n\n  pick(i) {\n    const answers = { ...this.state.answers, [this.state.q]: i };\n    this.setState({ answers });\n    if (this.props.autoAdvance ?? true) setTimeout(() => this.advance(), 440);\n  }\n\n  advance() {\n    const total = this.QUESTIONS.length;\n    const s = this.state;\n    if (s.q < total - 1) {\n      this.setState({ q: s.q + 1 });\n    } else {\n      const beat = this.props.showRevealBeat ?? true;\n      this.setState({ screen: beat ? 'reveal' : 'result' });\n    }\n  }\n\n  back() {\n    if (this.state.q > 0) this.setState({ q: this.state.q - 1 });\n  }\n\n  restart() {\n    this.setState({ screen: 'cover', q: 0, answers: {}, order: null, expanded: null });\n  }\n\n  computeResult() {\n    const totals = { OWN: 0, QUE: 0, FAIR: 0, CARE: 0, CUR: 0, ETH: 0, GLOB: 0 };\n    const qList = this.qList();\n    for (const k in this.state.answers) {\n      const oi = this.state.answers[k];\n      const opt = qList[k] && qList[k].options[oi];\n      if (opt && opt.s) for (const c in opt.s) totals[c] += opt.s[c];\n    }\n    const pri = ['OWN', 'QUE', 'FAIR', 'CARE', 'CUR', 'ETH', 'GLOB'];\n    let best = pri[0], bestv = -1;\n    for (const c of pri) { if (totals[c] > bestv) { bestv = totals[c]; best = c; } }\n    let sec = null, secv = -1;\n    for (const c of pri) { if (c !== best && totals[c] > secv) { secv = totals[c]; sec = c; } }\n    if (secv <= 0) sec = null;\n    return { key: best, sec };\n  }\n\n  renderVals() {\n    const total = this.QUESTIONS.length;\n    const s = this.state;\n    const auto = this.props.autoAdvance ?? true;\n    const qList = this.qList();\n    const cur = qList[s.q] || qList[0];\n    const answeredIdx = s.answers[s.q];\n\n    const options = (cur.options || []).map((o, i) => {\n      const sel = answeredIdx === i;\n      return {\n        text: o.t, letter: 'ABCDE'[i], selected: sel,\n        borderColor: sel ? '#F77025' : 'rgba(14,31,63,0.16)',\n        bg: sel ? '#FDF0E4' : '#FCF8F0',\n        badgeBg: sel ? '#F77025' : 'rgba(14,31,63,0.06)',\n        badgeColor: sel ? '#ffffff' : '#0E1F3F',\n        onClick: () => this.pick(i),\n      };\n    });\n\n    const answeredCount = Object.keys(s.answers).length;\n    const progressWidth = Math.round((answeredCount / total) * 100) + '%';\n\n    const r = this.computeResult();\n    const av = this.AVATARS[r.key];\n    const secHeading = (r.sec && r.sec !== r.key) ? this.C[r.sec].heading : '';\n\n    const pri = ['OWN', 'QUE', 'FAIR', 'CARE', 'CUR', 'ETH', 'GLOB'];\n    const expKey = s.expanded;\n    const expAv = expKey ? this.AVATARS[expKey] : null;\n    const allTypes = pri.map((k) => {\n      const a = this.AVATARS[k];\n      const mine = k === r.key;\n      const exp = expKey === k;\n      return {\n        mono: a.mono, name: a.name, tagline: a.tagline,\n        statement: this.C[k].heading, explain: this.C[k].explain,\n        isMine: mine,\n        showExplain: !expKey,\n        chevron: exp ? '−' : '+',\n        borderColor: (exp || mine) ? '#F77025' : 'rgba(14,31,63,0.14)',\n        bg: (exp || mine) ? '#FDF0E4' : '#FCF8F0',\n        badgeBg: (exp || mine) ? '#F77025' : 'rgba(14,31,63,0.08)',\n        badgeColor: (exp || mine) ? '#ffffff' : '#0E1F3F',\n        onToggle: () => this.setState({ expanded: exp ? null : k }),\n      };\n    });\n\n    return {\n      isCover: s.screen === 'cover', isQuiz: s.screen === 'quiz',\n      isReveal: s.screen === 'reveal', isResult: s.screen === 'result',\n      qNumber: String(s.q + 1).padStart(2, '0'), qTotal: String(total).padStart(2, '0'),\n      questionText: cur.q, options, progressWidth,\n      canBack: s.q > 0, showContinue: (answeredIdx !== undefined) && !auto,\n      onBegin: () => this.begin(), onBack: () => this.back(), onContinue: () => this.advance(),\n      onReveal: () => this.setState({ screen: 'result' }), onRestart: () => this.restart(),\n      avatarName: av.name, avatarMono: av.mono, avatarTagline: av.tagline, avatarEssence: av.essence,\n      avatarConvictionHeading: this.C[r.key].heading,\n      isSecondary: !!secHeading, avatarSecondary: secHeading ? ('With a strong thread of “' + secHeading + '.”') : '',\n      avatarStrengths: av.strengths, avatarGrowth: av.growth, avatarAtGMS: av.atGMS, avatarShareLine: av.share,\n      allTypes,\n      hasExpanded: !!expAv,\n      typesGridCols: expAv ? '1fr 1.05fr' : '1fr',\n      expandedName: expAv ? expAv.name : '',\n      expandedTagline: expAv ? expAv.tagline : '',\n      expandedStatement: expKey ? this.C[expKey].heading : '',\n      expandedParas: (expKey ? this.ORIG[expKey] : []).map((t) => ({ t })),\n      onCloseExpanded: () => this.setState({ expanded: null }),\n      manualOpen: s.manualOpen,\n      onToggleManual: () => this.setState({ manualOpen: !this.state.manualOpen }),\n      avatarArtSvg: React.createElement('svg', { width: 108, height: 108, viewBox: '0 0 24 24', fill: 'none', stroke: '#F77025', strokeWidth: 1.3, strokeLinecap: 'round', strokeLinejoin: 'round' }, (this.ART[r.key] || []).map((d, i) => React.createElement('path', { key: i, d: d }))),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
