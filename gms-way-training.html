  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ight:16px;background:#FF6632;flex:none\"><\u002Fspan>\n        <span style=\"font:600 11px/1 'DM Sans',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#25282B\">Choose a category<\u002Fspan>\n        <div style=\"flex:1;height:1px;background:#D8E0E4\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px\">\n        <sc-for list=\"{{ categories }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ c.open }}\" style=\"text-align:left;background:#F4F7F8;border:1px solid #D8E0E4;border-radius:8px;padding:24px 24px 20px;cursor:pointer;display:block\" style-hover=\"border-color:#009AE6;background:#ffffff\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n              <span style=\"font:500 32px/1 'DM Sans',sans-serif;color:#FF6632\">{{ c.order }}<\u002Fspan>\n              <span style=\"font:600 10px/1.3 'DM Sans',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#009AE6;text-align:right;max-width:150px\">{{ c.label }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font:500 20px/1.22 'DM Sans',sans-serif;color:#25282B;margin:18px 0 0\">{{ c.title }}<\u002Fh3>\n            <p style=\"font:400 13.5px/1.55 'DM Sans',sans-serif;color:#464546;margin:10px 0 0\">{{ c.desc }}<\u002Fp>\n\n            <sc-if value=\"{{ c.showProgress }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:18px\">\n                <div style=\"height:6px;background:#e4eaed;border-radius:3px;overflow:hidden\">\n                  <div style=\"height:100%;background:#FF6632;border-radius:3px;width:{{ c.pct }}%\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font:600 10.5px/1 'DM Sans',sans-serif;letter-spacing:.06em;color:#464546;margin-top:8px\">{{ c.progressText }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n if;letter-spacing:.12em;text-transform:uppercase;color:#464546\">{{ catProgressText }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:13px;align-items:center;margin-top:11px\">\n        <span style=\"width:5px;height:32px;background:#FF6632;border-radius:1px;flex:none\"><\u002Fspan>\n        <h2 style=\"font:500 27px/1.1 'DM Sans',sans-serif;color:#25282B;margin:0\">{{ catTitle }}<\u002Fh2>\n      <\u002Fdiv>\n      <sc-if value=\"{{ signedIn }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"height:6px;background:#eef2f4;border-radius:3px;overflow:hidden;margin-top:18px\">\n          <div style=\"height:100%;background:#FF6632;border-radius:3px;width:{{ catPct }}%\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"height:1px;background:#D8E0E4;margin:22px 0 4px\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width:760px;margin:0 auto;padding:8px 32px 0;display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ scenarios }}\" as=\"sc\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;align-items:center;gap:16px;background:#ffffff;border:1px solid #D8E0E4;border-radius:8px;padding:18px 20px\">\n          <span style=\"width:30px;height:30px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 12px 'DM Sans',sans-serif;background:{{ sc.badgeBg }};color:{{ sc.badgeColor }}\">{{ sc.badge }}<\u002Fspan>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font:600 15px/1.3 'DM Sans',sans-serif;color:#25282B\">{{ sc.title }}<\u002Fdiv>\n            <div style=\"font:400 12.5px/1.4 'DM Sans',sans-serif;color:#8b9298;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ sc.preview }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font:600 9.5px/1 'DM Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:{{ sc.statusColor }};flex:none\">{{ sc.statusText }}<\u002Fspan>\n          <button sc-camel-on-click=\"{{ sc.open }}\" style=\"flex:none;font:600 10.5px 'DM Sans',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#ffffff;background:{{ sc.btnBg }};border:none;border-radius:6px;padding:10px 16px;cursor:pointer\">{{ sc.btnLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================ PRACTICE ============================ -->\n  <sc-if value=\"{{ isPractice }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:720px;margin:0 auto;padding:28px 32px 0\">\n      <button sc-camel-on-click=\"{{ backCategory }}\" style=\"font:600 10px/1 'DM Sans',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#009AE6;background:none;border:none;padding:0;cursor:pointer\">← {{ catTitle }}<\u002Fbutton>\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-top:22px\">\n        <span style=\"font:600 10px/1 'DM Sans',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#009AE6\">{{ catLabel }}<\u002Fspan>\n        <span style=\"font:500 10px/1 'DM Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#464546\">{{ progressText }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width:720px;margin:0 auto;padding:20px 32px 0\">\n      <div style=\"background:#ffffff;border:1px solid #D8E0E4;border-radius:8px;box-shadow:0 16px 40px -30px rgba(37,40,43,.4);padding:26px 30px 30px\">\n        <div style=\"display:flex;align-items:center;gap:9px;justify-content:space-between\">\n          <div style=\"display:flex;align-items:center;gap:9px\">\n            <span style=\"width:4px;height:14px;background:#FF6632;flex:none\"><\u002Fspan>\n            <span style=\"font:600 9.5px/1 'DM Sans',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#464546\">The situation · {{ q.title }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font:600 9.5px/1 'DM Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:#007FC8\">✓ Completed<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <p style=\"font:400 17.5px/1.52 'DM Sans',sans-serif;margin:14px 0 0;color:#25282B\">{{ q.scenario }}<\u002Fp>\n        <p style=\"font:600 14px/1.45 'DM Sans',sans-serif;color:#FF6632;margin:16px 0 0\">{{ q.question }}<\u002Fp>\n\n        <textarea ref=\"{{ answerRef }}\" placeholder=\"Type what you'd actually do and say. Be specific — a GMS answer names the action, not the intention.\" style=\"width:100%;box-sizing:border-box;margin-top:16px;min-height:150px;resize:vertical;background:#F4F7F8;border:1px solid #D8E0E4;border-radius:6px;padding:14px 16px;font:400 15px/1.55 'DM Sans',sans-serif;color:#25282B;outline:none\"><\u002Ftextarea>\n        <button sc-camel-on-click=\"{{ submitCurrent }}\" disabled=\"{{ loading }}\" style=\"margin-top:12px;font:600 11px 'DM Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:#ffffff;background:#FF6632;border:none;border-radius:6px;padding:13px 24px;cursor:pointer\">Submit for feedback<\u002Fbutton>\n\n        <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:18px;font:italic 400 15px/1.5 'DM Sans',sans-serif;color:#007FC8;animation:gmsPulse 1.3s ease-in-out infinite\">Reading your response…<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:18px;font:400 13.5px/1.5 'DM Sans',sans-serif;color:#c0442a\">{{ errorMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showResult }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:22px;background:#FFF0EA;border:1px solid #ffdcce;border-left:3px solid {{ tone }};border-radius:5px;padding:17px 19px\">\n            <div style=\"font:700 10.5px/1 'DM Sans',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:{{ tone }}\">{{ label }}<\u002Fdiv>\n            <p style=\"font:400 15.5px/1.52 'DM Sans',sans-serif;margin:11px 0 0;color:#25282B\">{{ feedback }}<\u002Fp>\n            <p style=\"font:500 13px/1.5 'DM Sans',sans-serif;color:#464546;margin:12px 0 0\"><span style=\"color:#FF6632;font-weight:600\">Try this →<\u002Fspan> {{ tip }}<\u002Fp>\n            <button sc-camel-on-click=\"{{ toggleGms }}\" style=\"margin-top:15px;font:600 10.5px 'DM Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;color:#009AE6;cursor:pointer;padding:0\">{{ gmsToggleLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ showGms }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:14px;background:#EAF7FD;border:1px solid #cfe9f7;border-radius:5px;padding:16px 18px\">\n                <div style=\"font:700 10px/1 'DM Sans',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#007FC8\">The GMS view<\u002Fdiv>\n                <p style=\"font:400 15px/1.52 'DM Sans',sans-serif;margin:10px 0 0;color:#25282B\">{{ gmsAnswer }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:22px\">\n        <button sc-camel-on-click=\"{{ backCategory }}\" style=\"font:600 10.5px 'DM Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#464546;background:none;border:none;padding:0;cursor:pointer\">← Back to list<\u002Fbutton>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <button sc-camel-on-click=\"{{ next }}\" style=\"font:600 11px 'DM Sans',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#ffffff;background:#007FC8;border:none;border-radius:6px;padding:12px 22px;cursor:pointer\">{{ nextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    // AI grading + progress sync run through this Apps Script; the OpenRouter key\n    // lives in the script's Script Properties, never in this page or in GitHub.\n    // Question bank — read live from this Google Sheet (Tracks + Questions tabs)\n    this.QUESTION_SHEET_ID = '1_s6TUo06OAH5ID4KXl5Pt37YY3rddTycN15WsYr7Mn8';\n    // Progress sync — Google Apps Script web app deployed on the team sheet\n    this.PROGRESS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzQy6MhkNBy2mjmkc6ssbmHMTNAZn-EDYngnmT02_t_hBJDlyktEUo33X5zO_rL9pc/exec';\n    const model = this.buildModel(this.TRACKS(), this.QUESTIONS());\n    this.state = {\n      screen: 'home', catKey: null, qIndex: 0,\n      tracks: model.tracks, byTrack: model.byTrack,\n      email: '', signedIn: false, emailError: false,\n      done: {}, sheetTone: '#464546', sheetStatus: 'Progress saved on this device',\n      endpoint: this.PROGRESS_ENDPOINT,\n      results: {}, text: {}, loading: {}, error: {}, showGms: {},\n      syncTone: '#464546', syncMsg: 'Loading the latest question bank from Google Sheets…',\n      updatedText: '', updatedKnown: false,\n    };\n    this.answerRef = React.createRef();\n    this.emailRef = React.createRef();\n    this._lastKey = null;\n  }\n\n  TRACKS() {\n    return [\n      [\"recruitment\",\"1\",\"Student Recruitment\",\"International Student Recruitment\",\"Winning Chinese & SE Asian students for university clients across Google SEM, Baidu, TikTok, WeChat, RED and influencer & publisher partnerships.\"],\n      [\"chinese-social\",\"2\",\"Onshore Chinese Social\",\"Onshore Chinese Social & Multicultural\",\"WeChat & RED community and content for onshore Chinese and multicultural audiences — Bupa, Myer — where cultural nuance and care matter most.\"],\n      [\"domestic-performance\",\"3\",\"Domestic Performance & Brand\",\"Domestic Performance, Social & Brand\",\"Australia domestic performance media, social management and brand strategy for Deepal, Foton and Myer.\"],\n      [\"insights\",\"4\",\"Insights & Strategy\",\"Multicultural Insights & Strategy\",\"Market trends, target-audience analysis and media best-practice for international and multicultural marketing.\"]\n    ];\n  }\n  QUESTIONS() {\n    return [\n      [\"recruitment\",\"1\",\"One playbook, two markets\",\"A university client wants to run the same lead-gen playbook across China and Southeast Asia to save time — same creative, same channels, same Google SEM keywords. But mainland China effectively can't use Google (Baidu, WeChat, RED and Douyin do the work there), and the SE Asian markets behave differently again. The client is anchored on 'it worked last intake in SEA.'\",\"How do you respond to the client?\",\"Don't just execute the copy-paste. Explain, with specifics, why one playbook won't hold: Google/SEM has little reach in mainland China where Baidu, WeChat, RED and Douyin/TikTok carry the journey, and the SE Asian markets differ again in platform mix and decision path. Question the 'it worked in SEA' standard before adopting it for China, and propose a market-appropriate plan for each — while being honest about the extra effort. We're accountable for enrolments, not for reusing a template.\",\"Questions the one-size-fits-all standard; shows real platform/market knowledge (Baidu/WeChat/RED vs Google in China); proposes market-specific plans; frames success as enrolments; honest about the extra effort.\"],\n      [\"recruitment\",\"2\",\"The number that recruits\",\"To boost RED and WeChat engagement, an influencer draft implies the university guarantees post-study work visas and 'easy PR' — which isn't accurate. It would almost certainly drive more enquiries from anxious families, and the influencer says 'everyone words it like this.'\",\"What do you do?\",\"Don't run it. Recruiting students on a misleading promise about visas or PR is exactly the commercial outcome we won't pursue at the cost of honest dealing — and with families making a life decision, the stakes are real. Rewrite it to be accurate and still compelling, and push back on 'everyone words it like this': the GMS standard is content we'd be proud to explain in full. Protect the students' trust and the client's reputation.\",\"Refuses the misleading claim despite the performance upside; names the ethical and regulatory risk; rewrites to accurate-but-compelling; rejects the 'everyone does it' norm; protects students and client.\"],\n      [\"recruitment\",\"3\",\"The leaky funnel\",\"Your Baidu and Google SEM are hitting cost-per-lead targets, so on paper the campaign is a success. But you notice enquiries from WeChat aren't being followed up by the university's in-market agents for days, and those leads are going cold. Agent follow-up isn't in your scope.\",\"What do you do?\",\"Raise it — even though agent follow-up is outside our scope. Hitting CPL is a floor, not the goal; enrolments are. Flag to the client that leads are going cold, show the data, and recommend a fix — faster routing, follow-up SLAs with agents, or a WeChat lead-nurture we could run. We're judged by whether their enrolments are better for working with us, not by whether our CPL dashboard looks good.\",\"Looks past the in-scope KPI to the real outcome; surfaces the follow-up gap with data; proposes a concrete fix; owns the enrolment result, not just the lead.\"],\n      [\"recruitment\",\"4\",\"The trend from Douyin\",\"A format is exploding on Douyin for another education advertiser and the team wants to recreate it beat-for-beat on RED and TikTok for your university client across China and SEA. It's tempting to just localise the captions.\",\"How do you use it well?\",\"Use the insight, adapt the execution. Understand why it works on Douyin and whether that holds for a considered, high-stakes decision like studying abroad — on RED and TikTok, and for Chinese versus SE Asian audiences whose motivations differ. Rebuild it to fit each platform and market rather than transplanting it; genuine interest in how ideas travel across cultures makes the work sharper, and a straight copy usually reads as borrowed and underperforms.\",\"Adapts rather than copies beat-for-beat; interrogates platform and market fit (RED vs TikTok, China vs SEA); respects the considered nature of study-abroad; curious and open.\"],\n      [\"chinese-social\",\"1\",\"The health post that worried people\",\"On Bupa's WeChat, a follower posts a detailed, anxious question in Chinese about whether a specific condition is covered — it's genuine and personal, and other followers are now chiming in with their own worries. It's the weekend, and coverage answers are technically the client's remit.\",\"How do you handle it?\",\"Respond promptly, warmly and in-language — acknowledge the person, don't deflect — and move the specifics to a private channel where coverage can be answered properly, without giving clinical or coverage advice you're not qualified to give. Flag it to the client even on the weekend, because real people are anxious now and the thread is spreading. Handle it as a person to help, not a ticket to pass along — that's caring about the client's members as whole people.\",\"Responds fast, in-language and with genuine care; moves specifics private appropriately; avoids overstepping into clinical/coverage claims; alerts the client despite remit and timing.\"],\n      [\"chinese-social\",\"2\",\"Translate or transcreate\",\"Myer's team hands you an English seasonal campaign and asks you to 'just translate it into Chinese' for RED and WeChat by tomorrow. The concept leans on an English pun and imagery that won't land — and one visual reads, in Chinese cultural context, as mildly unlucky.\",\"What do you say, and what do you do?\",\"Don't just translate. Explain that a direct translation loses the pun and, worse, includes an image that reads as unlucky in Chinese culture — which would undercut the brand with the exact audience we're hired to win. Propose transcreation: keep the intent, rebuild the idea so it resonates for onshore Chinese consumers. Be honest about the timeline and offer a fast, culturally-sound alternative rather than shipping something you know will misfire.\",\"Rejects literal translation; identifies the cultural misfire specifically; proposes transcreation over translation; protects the brand with the target audience; honest about timing.\"],\n      [\"chinese-social\",\"3\",\"The KOL who wants more\",\"A well-fit RED KOL for Bupa is quietly frustrated: the fee is low, turnaround is tight, and they feel treated like 'a line in a plan.' They deliver well, but you sense they're about to disengage. Procurement wants to hold the rate.\",\"What do you do?\",\"Treat the KOL as a genuine partner, not a line in a media plan. Burning out a strong, on-brand creator isn't good business — it's short-term value extraction that costs us quality and continuity. Make the case internally for a fair fee and realistic turnaround, and be straight with the KOL about what's possible. Look for the arrangement that works for the client, the creator and us together.\",\"Treats the creator as a partner; rejects pure rate-squeezing; links fairness to quality and continuity; seeks an arrangement fair to all sides; honest with the KOL.\"],\n      [\"chinese-social\",\"4\",\"The comment nobody flagged\",\"A misleading rumour about Bupa is starting to circulate in the comments of an unrelated RED post and in a WeChat group you monitor. It's small now. Responding isn't in this week's content plan, and it might even draw more attention to it.\",\"What do you do?\",\"Don't look away because it's off-plan. Assess it quickly, flag it to the client with what you're seeing and options — monitor, correct gently, or escalate — and recommend a course rather than sitting on it. Small in-community rumours can compound; taking responsibility means noticing and acting early, with judgement about whether responding helps or amplifies, not ignoring it because it wasn't in the brief.\",\"Takes the emerging issue seriously; flags with options and a recommendation; weighs amplification risk with judgement; acts early rather than waiting for the plan.\"],\n      [\"domestic-performance\",\"1\",\"The default auto plan\",\"Deepal is a newer EV brand building awareness in Australia. The team's default performance template pours budget into bottom-funnel search and lead-gen because 'that's what drives cost-per-lead down.' But the brand is barely known here, and the template's data comes from established auto names with existing demand.\",\"What do you say to the team, and how do you decide?\",\"Question the template before adopting it. For a barely-known EV brand, harvesting demand that doesn't exist yet will look efficient on CPL while starving the brand-building that actually creates future buyers. Point out that the template's data comes from established marques with demand already there. Propose a plan that builds awareness and consideration alongside performance, and be honest about what each metric will and won't show. Adopt the standard only where it genuinely fits.\",\"Questions the bottom-funnel default; identifies the demand-vs-established-brand mismatch; argues for a brand-building balance; explains metric limitations; rigour, not contrarianism.\"],\n      [\"domestic-performance\",\"2\",\"The quarter that missed\",\"Foton's domestic quarter underperformed on leads. You could frame the report around a strong secondary metric and a favourable date window that would make it read as a win, and the client likely wouldn't dig in.\",\"What do you do?\",\"Report it straight. Show the real result on the metric that matters, own what didn't work, and bring a constructive plan to fix it. We won't dress up a miss as a win — the GMS standard is reporting we'd be proud to explain in full. Honest reporting keeps the client's trust and lets them make good decisions; a flattering narrative costs more later than it saves now.\",\"Refuses the flattering framing; leads with the real metric; owns the miss; brings a fix; frames honesty as protecting trust and good decisions.\"],\n      [\"domestic-performance\",\"3\",\"The launch and the lone weekend\",\"Deepal has a big model launch landing Saturday, so social and community response must be live and fast all weekend. It's fallen on one community manager to cover it solo, again — the launch stats will look great, but they're clearly stretched and haven't had a weekend off in weeks.\",\"What do you do?\",\"Deliver the launch and protect the person — both. Sort proper cover or a rota for the weekend rather than quietly leaning on one person's goodwill, and check in with them as a human, not just a resource. Strong launch numbers built on someone running down isn't the standard we hold. Caring for people as whole human beings and owning the client's outcome aren't in conflict — plan the launch so both are true.\",\"Holds both the launch outcome and the person's wellbeing; arranges real cover or a rota; checks in genuinely; rejects relying on unsustainable goodwill.\"],\n      [\"insights\",\"1\",\"The insight that fits the pitch\",\"You're building a multicultural audience analysis for a pitch. The neat story the team wants is 'Chinese Australians all research on RED and WeChat, full stop.' Your data is messier — big differences by age, migration generation and language preference, and meaningful use of mainstream Australian media too.\",\"How do you handle the insight?\",\"Tell the truer, messier story. Flattening 'Chinese Australians' into one behaviour is convenient for the pitch but wrong, and it would lead the client to bad targeting. Show the real segmentation — by age, migration generation and language — and where mainstream and Chinese platforms each play. Rigour means being honest about complexity even when a clean slide is tempting; the credibility of our insights is one of the most valuable things we offer.\",\"Rejects the oversimplified narrative; shows real segmentation (age, generation, language); values accuracy over a clean pitch slide; connects it to better client targeting.\"],\n      [\"insights\",\"2\",\"The best-practice you found\",\"Digging into a market-trends piece, you work out a genuinely sharper way to read RED versus Douyin behaviour for study-abroad and multicultural audiences — useful across several of our accounts. Writing it up properly and teaching the wider team would cost you real time in a busy week.\",\"What do you do?\",\"Share it and document it. An insight kept in your head helps one account; taught to the team it sharpens all of them — the collective intelligence of the team is one of our greatest assets, and it compounds when we invest in each other. Bring it to a WIP, write it up, and make it reusable. Curiosity is a professional commitment, and staying ahead only matters if the knowledge travels.\",\"Chooses to share and document; frames team knowledge as a compounding asset; makes it reusable across accounts; treats sharing as core work, not optional.\"],\n      [\"insights\",\"3\",\"Beyond your own lens\",\"A target-audience analysis for a multicultural campaign is being led by assumptions from the team's own experience, which doesn't include the community in question. Timelines are tight and 'we roughly know this audience' is the prevailing mood.\",\"What do you do?\",\"Push for genuine understanding over assumption. 'We roughly know this audience' from outside the community is how campaigns misfire and, worse, condescend. Bring in real signals — community sources, in-language listening, people with lived experience — and let what you learn change the plan. Being a global citizen is intellectual openness in practice: interest in a perspective beyond your own, and the humility to let it reshape the work.\",\"Challenges assumption-led targeting; brings in authentic community signal and lived experience; stays open to changing the plan; respectful and humble, not condescending.\"]\n    ];\n  }\n\n  buildModel(trackArrs, qArrs) {\n    const tracks = trackArrs\n      .filter(r => r[0])\n      .map(r => ({ key: String(r[0]).trim(), order: +r[1] || 0, label: r[2], title: r[3], desc: r[4] }))\n      .sort((a, b) => a.order - b.order);\n    const byTrack = {};\n    qArrs.filter(r => r[0] && r[3]).forEach(r => {\n      const k = String(r[0]).trim();\n      (byTrack[k] = byTrack[k] || []).push({ order: +r[1] || 0, title: r[2], scenario: r[3], question: r[4], gms: r[5], lookfor: r[6] });\n    });\n    Object.keys(byTrack).forEach(k => byTrack[k].sort((a, b) => a.order - b.order));\n    return { tracks, byTrack };\n  }\n\n  qid(catKey, q) { return catKey + ':' + q.order; }\n\n  componentDidMount() {\n    let email = '';\n    try { email = localStorage.getItem('gms_user_email') || ''; } catch (e) {}\n    this.fetchBank();\n    this.fetchMeta();\n    if (email) setTimeout(() => this.doSignIn(email), 150);\n  }\n\n  // Ask the Apps Script (via JSONP) for the question sheet's last-modified date.\n  // Requires the updated script to be deployed; fails quietly otherwise.\n  async fetchMeta() {\n    try {\n      const j = await this.jsonp(this.PROGRESS_ENDPOINT, 'action=meta');\n      if (!j || !j.ok || !j.updated) throw new Error('no date');\n      const d = new Date(j.updated);\n      if (isNaN(d.getTime())) throw new Error('bad date');\n      const txt = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });\n      this.setState({ updatedText: txt, updatedKnown: true });\n    } catch (e) {\n      this.setState({ updatedKnown: false });\n    }\n  }\n\n  // Auto-load the question bank from the Google Sheet's Tracks + Questions tabs.\n  // gviz CSV export is CORS-friendly for a link-shared sheet; SheetJS parses the\n  // CSV (handles quoted fields, embedded commas and newlines). Falls back to the\n  // built-in bank if the sheet can't be reached.\n  async fetchBank() {\n    const id = this.QUESTION_SHEET_ID;\n    const csvUrl = (tab) => 'https://docs.google.com/spreadsheets/d/' + id + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(tab);\n    const toRows = (csv) => window.XLSX.utils.sheet_to_json(window.XLSX.read(csv, { type: 'string' }).Sheets.Sheet1, { header: 1, defval: '' });\n    try {\n      if (!window.XLSX) throw new Error('reader not ready');\n      const [tCsv, qCsv] = await Promise.all([\n        fetch(csvUrl('Tracks')).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); }),\n        fetch(csvUrl('Questions')).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); }),\n      ]);\n      const model = this.parseSheets(toRows(tCsv), toRows(qCsv));\n      if (!model.tracks.length || !Object.keys(model.byTrack).length) throw new Error('no rows parsed');\n      const n = Object.values(model.byTrack).reduce((a, v) => a + v.length, 0);\n      this.setState({ tracks: model.tracks, byTrack: model.byTrack, syncTone: '#007FC8', syncMsg: 'Question bank synced from Google Sheets · ' + model.tracks.length + ' categories, ' + n + ' scenarios.' });\n    } catch (e) {\n      this.setState({ syncTone: '#c0442a', syncMsg: 'Could not reach the Google Sheet — showing the last built-in question bank.' });\n    }\n  }\n\n  componentDidUpdate() {\n    if (this.state.screen === 'practice') {\n      const k = this.curKey();\n      if (this.answerRef.current && k !== this._lastKey) {\n        this.answerRef.current.value = this.state.text[k] || '';\n        this._lastKey = k;\n      }\n    } else {\n      this._lastKey = null;\n    }\n  }\n\n  curKey() { return this.state.catKey + ':' + this.state.qIndex; }\n\n  // ---- progress persistence ----\n  localKey(email) { return 'gms_progress_' + (email || '').toLowerCase().trim(); }\n  loadLocal(email) {\n    try { return JSON.parse(localStorage.getItem(this.localKey(email)) || '{}') || {}; } catch (e) { return {}; }\n  }\n  saveLocal(email, done) {\n    try { localStorage.setItem(this.localKey(email), JSON.stringify(done)); } catch (e) {}\n  }\n\n  validEmail(v) { return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v); }\n\n  signIn() {\n    const v = (this.emailRef.current && this.emailRef.current.value || '').trim().toLowerCase();\n    if (!this.validEmail(v)) { this.setState({ emailError: true }); return; }\n    this.doSignIn(v);\n  }\n  onEmailKey(e) { if (e.key === 'Enter') this.signIn(); }\n\n  doSignIn(email) {\n    const done = this.loadLocal(email);\n    try { localStorage.setItem('gms_user_email', email); } catch (e) {}\n    const synced = !!this.state.endpoint;\n    this.setState({\n      email, signedIn: true, emailError: false, done,\n      sheetTone: synced ? '#007FC8' : '#464546',\n      sheetStatus: synced ? 'Synced with team Google Sheet' : 'Progress saved on this device',\n    });\n    if (this.state.endpoint) this.pullRemote(email, done);\n  }\n\n  signOut() {\n    try { localStorage.removeItem('gms_user_email'); } catch (e) {}\n    this.setState({ email: '', signedIn: false, done: {}, sheetTone: '#464546', sheetStatus: 'Progress saved on this device' });\n  }\n\n  // Reads use JSONP. Apps Script sends no CORS headers, so a plain fetch() GET is\n  // blocked cross-origin. Loading the endpoint as a script src is not subject to\n  // CORS; the deployment returns  callback({...})  when we pass ?callback=.\n  jsonp(ep, params) {\n    return new Promise((resolve, reject) => {\n      const cb = '__gmsCb' + Date.now() + Math.floor(Math.random() * 1e6);\n      const sep = ep.indexOf('?') >= 0 ? '&' : '?';\n      const src = ep + sep + params + '&callback=' + cb;\n      const el = document.createElement('script');\n      let done = false;\n      const cleanup = () => { try { delete window[cb]; } catch (e) { window[cb] = undefined; } if (el.parentNode) el.parentNode.removeChild(el); };\n      const timer = setTimeout(() => { if (!done) { done = true; cleanup(); reject(new Error('timeout')); } }, 12000);\n      window[cb] = (data) => { if (done) return; done = true; clearTimeout(timer); cleanup(); resolve(data); };\n      el.onerror = () => { if (done) return; done = true; clearTimeout(timer); cleanup(); reject(new Error('script error')); };\n      el.src = src;\n      document.head.appendChild(el);\n    });\n  }\n\n  // Best-effort restore of any progress recorded on other devices. Writes go to\n  // the sheet regardless, so a read failure is NOT a sync failure — we keep the\n  // positive status and just fall back to this device's saved progress.\n  async pullRemote(email, localDone) {\n    const ep = this.state.endpoint;\n    if (!ep) return;\n    try {\n      const j = await this.jsonp(ep, 'email=' + encodeURIComponent(email));\n      if (!j || !j.ok) throw new Error((j && j.error) || 'error');\n      const merged = { ...(localDone || {}) };\n      (j.rows || []).forEach(r => { if (r.questionId) merged[r.questionId] = { verdict: r.verdict || '', at: r.at || Date.now() }; });\n      this.saveLocal(email, merged);\n      this.setState({ done: merged, sheetTone: '#007FC8', sheetStatus: 'Synced with team Google Sheet' });\n    } catch (e) {\n      this.setState({ sheetTone: '#007FC8', sheetStatus: 'Synced with team Google Sheet' });\n    }\n  }\n\n  // Writes use a no-CORS POST with a text/plain body: a \"simple request\" the\n  // browser sends without preflight, so Apps Script's doPost runs. The response\n  // is opaque (unreadable), which is fine — it is fire-and-forget.\n  async pushRemote(rec) {\n    const ep = this.state.endpoint;\n    if (!ep) return;\n    try {\n      await fetch(ep, { method: 'POST', mode: 'no-cors', headers: { 'content-type': 'text/plain;charset=utf-8' }, body: JSON.stringify(rec) });\n      this.setState({ sheetTone: '#007FC8', sheetStatus: 'Synced with team Google Sheet' });\n    } catch (e) {\n      this.setState({ sheetTone: '#c0442a', sheetStatus: 'Saved on this device — sheet update failed' });\n    }\n  }\n\n  markComplete(catKey, q, verdict) {\n    if (!this.state.signedIn) return;\n    const id = this.qid(catKey, q);\n    const done = { ...this.state.done, [id]: { verdict, at: Date.now() } };\n    this.saveLocal(this.state.email, done);\n    this.setState({ done });\n    const cat = this.state.tracks.find(t => t.key === catKey) || {};\n    this.pushRemote({ email: this.state.email, category: cat.title || catKey, questionId: id, title: q.title, verdict });\n  }\n\n  // ---- navigation ----\n  openCategory(key) { this.setState({ screen: 'category', catKey: key }); }\n  openScenario(index) { this.setState({ screen: 'practice', qIndex: index }); }\n  backHome() { this.setState({ screen: 'home' }); }\n  backCategory() {\n    const el = this.answerRef.current, k = this.curKey();\n    this.setState(st => ({ text: { ...st.text, [k]: el ? el.value : '' }, screen: 'category' }));\n  }\n  next() {\n    const list = this.state.byTrack[this.state.catKey] || [];\n    const ni = this.state.qIndex + 1;\n    const el = this.answerRef.current, k = this.curKey();\n    const v = el ? el.value : '';\n    if (ni >= list.length) { this.setState(st => ({ text: { ...st.text, [k]: v }, screen: 'category' })); return; }\n    this.setState(st => ({ text: { ...st.text, [k]: v }, qIndex: ni }));\n  }\n\n  parseSheets(tRows, qRows) {\n    const idx = (headers, ...subs) => {\n      const h = headers.map(x => String(x).toLowerCase().trim());\n      for (const s of subs) { const i = h.findIndex(x => x.indexOf(s) >= 0); if (i >= 0) return i; }\n      return -1;\n    };\n    const th = tRows[0] || [];\n    const tk = idx(th, 'key'), to = idx(th, 'order'), tl = idx(th, 'short', 'label'), tt = idx(th, 'track', 'categor', 'principle', 'name'), td = idx(th, 'desc');\n    const trackArrs = tRows.slice(1).map(r => [r[tk], r[to], r[tl], r[tt], r[td]]);\n    const qh = qRows[0] || [];\n    const qk = idx(qh, 'track', 'categor'), qo = idx(qh, 'order'), qt = idx(qh, 'title'), qs = idx(qh, 'scenario'), qq = idx(qh, 'question'), qg = idx(qh, 'gms', 'answer'), ql = idx(qh, 'good', 'look');\n    const qArrs = qRows.slice(1).map(r => [r[qk], r[qo], r[qt], r[qs], r[qq], r[qg], r[ql]]);\n    return this.buildModel(trackArrs, qArrs);\n  }\n\n  async submit() {\n    const list = this.state.byTrack[this.state.catKey] || [];\n    const q = list[this.state.qIndex];\n    if (!q) return;\n    const el = this.answerRef.current;\n    const ans = (el && el.value || '').trim();\n    const key = this.curKey();\n    if (ans.length < 15) {\n      this.setState(st => ({ error: { ...st.error, [key]: 'Write a bit more — give a real, specific answer to get useful feedback.' }, results: { ...st.results, [key]: null } }));\n      return;\n    }\n    this.setState(st => ({ loading: { ...st.loading, [key]: true }, error: { ...st.error, [key]: null }, results: { ...st.results, [key]: null }, text: { ...st.text, [key]: ans } }));\n    // Grading runs server-side in the Apps Script (the OpenRouter key stays there,\n    // never in this page). We send only the questionId + the written answer.\n    try {\n      const qid = this.qid(this.state.catKey, q);\n      const j = await this.jsonp(this.PROGRESS_ENDPOINT, 'action=grade&qid=' + encodeURIComponent(qid) + '&answer=' + encodeURIComponent(ans));\n      if (!j || !j.ok) throw new Error((j && j.error) || 'grading failed');\n      const r = { verdict: j.verdict || 'developing', feedback: j.feedback || '', tip: j.tip || '' };\n      this.setState(st => ({ results: { ...st.results, [key]: r }, loading: { ...st.loading, [key]: false } }));\n      this.markComplete(this.state.catKey, q, r.verdict);\n    } catch (e) {\n      this.setState(st => ({ error: { ...st.error, [key]: 'Could not reach the AI mentor (' + ((e && e.message) || 'error') + '). Check your connection and try again.' }, loading: { ...st.loading, [key]: false } }));\n    }\n  }\n\n  catCounts(catKey) {\n    const list = this.state.byTrack[catKey] || [];\n    let done = 0;\n    list.forEach(q => { if (this.state.done[this.qid(catKey, q)]) done++; });\n    return { done, total: list.length };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const out = {};\n    out.isHome = s.screen === 'home';\n    out.isCategory = s.screen === 'category';\n    out.isPractice = s.screen === 'practice';\n\n    out.signedIn = s.signedIn;\n    out.signedOut = !s.signedIn;\n    out.email = s.email;\n    out.emailError = s.emailError;\n    out.emailRef = this.emailRef;\n    out.onEmailKey = (e) => this.onEmailKey(e);\n    out.signIn = () => this.signIn();\n    out.signOut = () => this.signOut();\n    out.sheetTone = s.sheetTone;\n    out.sheetStatus = s.sheetStatus;\n\n    let overallDone = 0, overallTotal = 0;\n    out.categories = s.tracks.map(t => {\n      const c = this.catCounts(t.key);\n      overallDone += c.done; overallTotal += c.total;\n      const pct = c.total ? Math.round((c.done / c.total) * 100) : 0;\n      return {\n        order: String(t.order).padStart(2, '0'),\n        label: t.label, title: t.title, desc: t.desc, count: c.total,\n        showProgress: s.signedIn,\n        pct: pct, progressText: c.done + ' of ' + c.total + ' completed',\n        open: () => this.openCategory(t.key),\n      };\n    });\n    out.overallText = overallTotal ? (overallDone + ' of ' + overallTotal + ' scenarios complete') : 'No scenarios yet';\n\n    // question-bank sync status (read-only)\n    out.syncTone = s.syncTone; out.syncMsg = s.syncMsg;\n    out.updatedText = s.updatedText; out.updatedKnown = s.updatedKnown;\n\n    // category / practice shared\n    const list = s.byTrack[s.catKey] || [];\n    const cat = s.tracks.find(t => t.key === s.catKey) || {};\n    const cc = this.catCounts(s.catKey);\n    out.catLabel = cat.label || '';\n    out.catTitle = cat.title || '';\n    out.catProgressText = s.signedIn ? (cc.done + ' / ' + cc.total + ' completed') : (cc.total + ' scenarios');\n    out.catPct = cc.total ? Math.round((cc.done / cc.total) * 100) : 0;\n\n    out.scenarios = list.map((q, i) => {\n      const doneRec = s.done[this.qid(s.catKey, q)];\n      const completed = !!doneRec;\n      return {\n        badge: completed ? '✓' : String(i + 1),\n        badgeBg: completed ? '#007FC8' : '#F4F7F8',\n        badgeColor: completed ? '#ffffff' : '#464546',\n        title: q.title,\n        preview: q.scenario,\n        statusText: !s.signedIn ? '' : (completed ? 'Completed' : 'Not started'),\n        statusColor: completed ? '#007FC8' : '#8b9298',\n        btnLabel: completed ? 'Review' : 'Practice',\n        btnBg: completed ? '#007FC8' : '#FF6632',\n        open: () => this.openScenario(i),\n      };\n    });\n\n    const q = list[s.qIndex] || {};\n    const key = s.catKey + ':' + s.qIndex;\n    const r = s.results[key];\n    out.progressText = 'Scenario ' + (s.qIndex + 1) + ' of ' + (list.length || 1);\n    out.q = { title: q.title || '', scenario: q.scenario || '', question: q.question || '' };\n    out.gmsAnswer = q.gms || '';\n    out.isDone = !!(q.order != null && s.done[s.catKey + ':' + q.order]);\n    out.answerRef = this.answerRef;\n    out.submitCurrent = () => this.submit();\n    out.loading = !!s.loading[key];\n    out.showError = !!s.error[key];\n    out.errorMsg = s.error[key] || '';\n    out.showResult = !!r;\n    out.tone = r ? (r.verdict === 'strong' ? '#007FC8' : (r.verdict === 'off-track' ? '#464546' : '#FF8A5C')) : '#464546';\n    out.label = r ? ({ strong: 'Strong — this is the GMS Way', developing: 'Developing', 'off-track': 'Not there yet' }[r.verdict] || 'Developing') : '';\n    out.feedback = r ? r.feedback : '';\n    out.tip = r ? r.tip : '';\n    out.showGms = !!s.showGms[key];\n    out.gmsToggleLabel = s.showGms[key] ? 'Hide the GMS view ↑' : 'Compare with the GMS view ↓';\n    out.toggleGms = () => this.setState(st => ({ showGms: { ...st.showGms, [key]: !st.showGms[key] } }));\n    out.next = () => this.next();\n    out.nextLabel = (s.qIndex >= list.length - 1) ? 'Back to list ✓' : 'Next scenario →';\n    out.backHome = () => this.backHome();\n    out.backCategory = () => this.backCategory();\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
