document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#4a463d;min-height:70px;margin-top:10px\"><span data-ai-a=\"\"><\u002Fspan><span data-ai-caret=\"\" style=\"display:inline-block;width:8px;height:15px;background:#F4581F;vertical-align:-2px;margin-left:2px;animation:caretBlink 1s steps(1) infinite\"><\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- ARGUMENT -->\n          <section style=\"padding:64px 60px 30px;max-width:860px\">\n            <p data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.75,.25,1);font-size:19px;line-height:1.75;margin:0 0 26px\"><span style=\"float:left;font-family:'Spectral',serif;font-weight:600;font-size:82px;line-height:.78;padding:6px 14px 0 0;color:#F4581F\">F<\u002Fspan>or twenty years, marketing optimised a funnel that began with a search box. That box is quietly disappearing. Buyers now ask a model, and the model answers with a synthesis — one they never see the sources of, and rarely question.<\u002Fp>\n            <p data-reveal=\"\" data-delay=\"80\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.75,.25,1);font-size:19px;line-height:1.75;margin:0 0 40px\">The implication is uncomfortable: if an AI can't read your brand, your brand no longer exists at the moment of decision. This is not a channel to add. It's the ground shifting under every channel you already run.<\u002Fp>\n\n            <blockquote data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.75,.25,1);margin:0 0 44px;padding-left:28px;border-left:4px solid #F4581F\">\n              <p style=\"font-family:'Spectral',serif;font-weight:500;font-size:34px;line-height:1.25;letter-spacing:-.01em;margin:0;color:#23231F\">\"Read the room before you enter it — even when the room is now a language model.\"<\u002Fp>\n            <\u002Fblockquote>\n          <\u002Fsection>\n\n          <!-- DATA FIGURE -->\n          <section style=\"padding:20px 60px 64px\">\n            <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.75,.25,1);background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:16px;padding:40px\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#0C7CB8;margin-bottom:8px\">Figure 1 · Our own tracking<\u002Fdiv>\n              <h3 style=\"font-family:'Spectral',serif;font-weight:600;font-size:28px;margin:0 0 28px\">AI's share of the buying journey<\u002Fh3>\n              <div style=\"display:flex;gap:44px;align-items:flex-end\">\n                <div style=\"flex:none;display:flex;gap:34px;align-items:flex-end;height:200px\">\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;justify-content:flex-end;height:100%\"><div style=\"font-family:'Sora';font-weight:800;font-size:26px;color:#23231F\"><span data-count=\"46\">0<\u002Fspan>%<\u002Fdiv><div style=\"width:52px;height:92px;background:linear-gradient(180deg,#9fb0bd,#c3ccd3);border-radius:6px 6px 0 0\"><\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6b675e\">2024<\u002Fdiv><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;justify-content:flex-end;height:100%\"><div style=\"font-family:'Sora';font-weight:800;font-size:26px;color:#23231F\"><span data-count=\"62\">0<\u002Fspan>%<\u002Fdiv><div style=\"width:52px;height:124px;background:linear-gradient(180deg,#4aa7d8,#7fc2e6);border-radius:6px 6px 0 0\"><\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6b675e\">2025<\u002Fdiv><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;justify-content:flex-end;height:100%\"><div style=\"font-family:'Sora';font-weight:800;font-size:26px;color:#F4581F\"><span data-count=\"80\">0<\u002Fspan>%<\u002Fdiv><div style=\"width:52px;height:160px;background:linear-gradient(180deg,#F4581F,#ff8a5c);border-radius:6px 6px 0 0\"><\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6b675e\">2026<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <p style=\"font-size:16px;line-height:1.65;color:#4a463d;margin:0;max-width:300px\">Adoption isn't creeping — it's compounding. The buyers who used to compare tabs now accept a single generated answer. The question is whether that answer includes you.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- WOVEN THREE -->\n          <section style=\"padding:0 60px 64px;max-width:900px\">\n            <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.75,.25,1);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#F4581F;margin-bottom:18px\">Why we can say this<\u002Fdiv>\n            <p data-reveal=\"\" data-delay=\"80\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.75,.25,1);font-family:'Spectral',serif;font-size:30px;line-height:1.4;margin:0;letter-spacing:-.01em\">Most agencies have one discipline. We reason across three at once — <span style=\"color:#F4581F;font-weight:600\">AI<\u002Fspan> to see what the machine sees, <span style=\"color:#0C7CB8;font-weight:600\">Marketing<\u002Fspan> to turn it into demand, and <span style=\"font-weight:600\">Sociology<\u002Fspan> to know why a culture behaves the way it does. Woven, not stacked.<\u002Fp>\n          <\u002Fsection>\n\n          <!-- INDEX -->\n          <section style=\"padding:48px 60px;background:#efece5;border-top:1px solid rgba(0,0,0,.1)\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#6b675e;margin-bottom:24px\">Also in this issue<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px 40px\">\n              <a href=\"#\" style=\"display:block;padding:18px 0;border-top:1px solid rgba(0,0,0,.14)\"><span style=\"font-family:'IBM Plex Mono';font-size:12px;color:#0C7CB8\">01<\u002Fspan><div style=\"font-family:'Spectral',serif;font-size:21px;color:#23231F;margin-top:4px\">What AI actually sees on your homepage<\u002Fdiv><\u002Fa>\n              <a href=\"#\" style=\"display:block;padding:18px 0;border-top:1px solid rgba(0,0,0,.14)\"><span style=\"font-family:'IBM Plex Mono';font-size:12px;color:#0C7CB8\">02<\u002Fspan><div style=\"font-family:'Spectral',serif;font-size:21px;color:#23231F;margin-top:4px\">The stealth-research shift, in numbers<\u002Fdiv><\u002Fa>\n              <a href=\"#\" style=\"display:block;padding:18px 0;border-top:1px solid rgba(0,0,0,.14)\"><span style=\"font-family:'IBM Plex Mono';font-size:12px;color:#0C7CB8\">03<\u002Fspan><div style=\"font-family:'Spectral',serif;font-size:21px;color:#23231F;margin-top:4px\">Decoding the multicultural audience next door<\u002Fdiv><\u002Fa>\n              <a href=\"#\" style=\"display:block;padding:18px 0;border-top:1px solid rgba(0,0,0,.14)\"><span style=\"font-family:'IBM Plex Mono';font-size:12px;color:#0C7CB8\">04<\u002Fspan><div style=\"font-family:'Spectral',serif;font-size:21px;color:#23231F;margin-top:4px\">Why Naver beats Google in Seoul<\u002Fdiv><\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- CTA -->\n          <section style=\"padding:72px 60px;text-align:center\">\n            <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.75,.25,1);font-family:'Spectral',serif;font-weight:600;font-size:38px;letter-spacing:-.01em;margin:0 0 22px\">Want the thinking before the pitch?<\u002Fh2>\n            <a href=\"#\" style=\"display:inline-block;font-family:'Sora';font-weight:600;font-size:17px;color:#fff;background:#23231F;padding:15px 30px;border-radius:10px\">Subscribe to Intelligence<\u002Fa>\n          <\u002Fsection>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <p style=\"margin:34px 0 0;font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.6;color:#7a7a80;max-width:820px\">Try next: \"push <a href=\"#1a\" style=\"color:#0C7CB8\">1a<\u002Fa> further — make the decode more cinematic\" · \"give <a href=\"#1b\" style=\"color:#0C7CB8\">1b<\u002Fa> a real world-map silhouette\" · \"combine the recommended shape — <a href=\"#1a\" style=\"color:#0C7CB8\">1a<\u002Fa> hero leading into <a href=\"#1b\" style=\"color:#0C7CB8\">1b<\u002Fa>\" · \"add Direction D, the live Decoder tool\".<\u002Fp>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;morphSpeedMs&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:2200,&quot;min&quot;:900,&quot;max&quot;:4000,&quot;step&quot;:100,&quot;unit&quot;:&quot;ms&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;frameHeight&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:880,&quot;min&quot;:640,&quot;max&quot;:1100,&quot;step&quot;:20,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Layout&quot;}}\">\nclass Component extends DCLogic {\n  markets = [\n    { name: \"China\", region: \"East Asia\", platforms: \"RED · WeChat · Douyin\", behaviour: \"Search starts inside super-apps, not Google — discovery is social and closed-loop.\", result: \"+170% YoY\" },\n    { name: \"India\", region: \"South Asia\", platforms: \"WhatsApp · Instagram · JioCinema\", behaviour: \"Regional-language intent outperforms English by a wide margin.\", result: \"CPL −52.5%\" },\n    { name: \"Indonesia\", region: \"Southeast Asia\", platforms: \"TikTok · WhatsApp · Shopee\", behaviour: \"Community sellers, not ads, drive product discovery.\", result: \"+3.4× reach\" },\n    { name: \"South Korea\", region: \"East Asia\", platforms: \"KakaoTalk · Naver · Coupang\", behaviour: \"Naver — not Google — owns the query and the review economy.\", result: \"+88% CTR\" },\n    { name: \"Japan\", region: \"East Asia\", platforms: \"LINE · Yahoo! JP · X\", behaviour: \"Trust is earned slowly; LINE is the utility layer for everything.\", result: \"2.1× LTV\" },\n    { name: \"Vietnam\", region: \"Southeast Asia\", platforms: \"Zalo · TikTok · Facebook\", behaviour: \"Zalo is the default channel outsiders forget exists.\", result: \"−41% CAC\" },\n    { name: \"Australia\", region: \"Oceania\", platforms: \"Meta · TikTok · WeChat\", behaviour: \"A genuinely multicultural audience hiding behind one language.\", result: \"+62% leads\" },\n    { name: \"Middle East\", region: \"GCC\", platforms: \"Instagram · Snap · TikTok\", behaviour: \"Bilingual, mobile-first, and highly seasonal around religious calendars.\", result: \"+2.7× ROAS\" },\n    { name: \"USA · multicultural\", region: \"North America\", platforms: \"TikTok · YouTube · WhatsApp\", behaviour: \"The fastest-growing segments are reached in-language, at home.\", result: \"+45% recall\" }\n  ];\n\n  componentDidMount() {\n    const reduce = (this.props.reduceMotion ?? false) || (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);\n    const fh = this.props.frameHeight;\n    if (fh) document.querySelectorAll('[data-scroll]').forEach(c => { c.style.height = fh + 'px'; });\n    this.setupReveals(reduce);\n    this.setupCounts(reduce);\n    this.setupLens(reduce);\n    if (!reduce) this.setupMorph();\n    this.setupAtlas();\n    this.setupVideos();\n    this.setupHouseAI(reduce);\n    this.setupFX(reduce);\n  }\n\n  setupFX(reduce) {\n    const defs = [\n      { sel: '[data-fx=\"lens\"]', kind: 'bloom' },\n      { sel: '[data-fx=\"atlas\"]', kind: 'net' },\n      { sel: '[data-fx=\"house\"]', kind: 'aurora' },\n      { sel: '[data-fx=\"atlas2\"]', kind: 'net' }\n    ];\n    this._fx = [];\n    const rnd = (a, b) => a + Math.random() * (b - a);\n    defs.forEach(d => {\n      const cv = document.querySelector(d.sel);\n      if (!cv) return;\n      const ctx = cv.getContext('2d');\n      const s = { cv, ctx, kind: d.kind, parts: [], w: 0, h: 0, mx: 0.5, my: 0.4, t: Math.random() * 100 };\n      const resize = () => {\n        const r = cv.getBoundingClientRect();\n        const dpr = Math.min(window.devicePixelRatio || 1, 2);\n        s.w = r.width; s.h = r.height;\n        cv.width = Math.max(1, Math.round(r.width * dpr));\n        cv.height = Math.max(1, Math.round(r.height * dpr));\n        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      };\n      resize();\n      if (window.ResizeObserver) { const ro = new ResizeObserver(resize); ro.observe(cv); }\n      else window.addEventListener('resize', resize);\n      if (d.kind === 'bloom') s.parts = Array.from({ length: 58 }, () => ({ x: Math.random(), y: Math.random(), r: rnd(0.5, 2.2), sp: rnd(0.0005, 0.0020), ph: Math.random() * 6.28, warm: Math.random() < 0.62 }));\n      else if (d.kind === 'net') s.parts = Array.from({ length: 30 }, (_, i) => ({ x: Math.random(), y: Math.random(), vx: rnd(-0.03, 0.03), vy: rnd(-0.03, 0.03), warm: i % 8 === 0 }));\n      const host = cv.parentElement;\n      if (host) host.addEventListener('pointermove', (e) => { const r = cv.getBoundingClientRect(); s.mx = (e.clientX - r.left) / r.width; s.my = (e.clientY - r.top) / r.height; });\n      this._fx.push(s);\n    });\n    if (reduce) { this._fx.forEach(s => this.drawFX(s, true)); return; }\n    const loop = () => { this._fx.forEach(s => { s.t += 0.006; this.drawFX(s, false); }); this._raf = requestAnimationFrame(loop); };\n    this._raf = requestAnimationFrame(loop);\n  }\n\n  drawFX(s, stat) {\n    const { ctx, w, h, t } = s;\n    if (!w || !h) return;\n    ctx.clearRect(0, 0, w, h);\n    if (s.kind === 'bloom') {\n      ctx.globalCompositeOperation = 'lighter';\n      const lcx = w * 0.66, lcy = h * 0.44, px = w * s.mx, py = h * s.my;\n      const glow = (cx, cy, rad, col, a) => { const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad); g.addColorStop(0, col.replace('A', a)); g.addColorStop(1, col.replace('A', '0')); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, rad, 0, 6.2832); ctx.fill(); };\n      glow(lcx + (px - lcx) * 0.12, lcy + (py - lcy) * 0.12, w * 0.34 * (1 + 0.10 * Math.sin(t * 2)), 'rgba(255,106,51,A)', 0.30);\n      glow(lcx - w * 0.20, lcy + h * 0.14, w * 0.26 * (1 + 0.12 * Math.cos(t * 1.7)), 'rgba(18,161,232,A)', 0.20);\n      s.parts.forEach(p => {\n        if (!stat) { p.y -= p.sp; p.x += Math.sin(t * 1.3 + p.ph) * 0.0003; if (p.y < -0.05) { p.y = 1.05; p.x = Math.random(); } }\n        const x = p.x * w, y = p.y * h, rr = p.r * (1 + 0.35 * Math.sin(t * 3 + p.ph));\n        const col = p.warm ? 'rgba(255,140,80,' : 'rgba(120,200,245,';\n        const g = ctx.createRadialGradient(x, y, 0, x, y, rr * 4);\n        g.addColorStop(0, col + '0.5)'); g.addColorStop(1, col + '0)');\n        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, rr * 4, 0, 6.2832); ctx.fill();\n      });\n      ctx.globalCompositeOperation = 'source-over';\n    } else if (s.kind === 'net') {\n      const pts = s.parts;\n      if (!stat) pts.forEach(p => { p.x += p.vx * 0.01; p.y += p.vy * 0.01; if (p.x < 0 || p.x > 1) p.vx *= -1; if (p.y < 0 || p.y > 1) p.vy *= -1; p.x = Math.max(0, Math.min(1, p.x)); p.y = Math.max(0, Math.min(1, p.y)); });\n      const max = w * 0.17;\n      for (let i = 0; i < pts.length; i++) for (let j = i + 1; j < pts.length; j++) {\n        const a = pts[i], b = pts[j], dx = (a.x - b.x) * w, dy = (a.y - b.y) * h, d = Math.hypot(dx, dy);\n        if (d < max) { const al = (1 - d / max) * 0.42; ctx.strokeStyle = 'rgba(18,161,232,' + al.toFixed(3) + ')'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(a.x * w, a.y * h); ctx.lineTo(b.x * w, b.y * h); ctx.stroke(); }\n      }\n      pts.forEach(p => { const x = p.x * w, y = p.y * h; ctx.fillStyle = p.warm ? 'rgba(255,106,51,0.9)' : 'rgba(120,200,245,0.6)'; ctx.beginPath(); ctx.arc(x, y, p.warm ? 2.6 : 1.7, 0, 6.2832); ctx.fill(); });\n    } else if (s.kind === 'aurora') {\n      const blob = (cx, cy, rad, col, a) => { const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad); g.addColorStop(0, col + a + ')'); g.addColorStop(1, col + '0)'); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, rad, 0, 6.2832); ctx.fill(); };\n      blob(w * (0.30 + 0.12 * Math.sin(t * 0.6)), h * (0.40 + 0.20 * Math.cos(t * 0.5)), w * 0.44, 'rgba(255,120,60,', 0.10);\n      blob(w * (0.72 + 0.12 * Math.cos(t * 0.4)), h * (0.55 + 0.16 * Math.sin(t * 0.7)), w * 0.40, 'rgba(30,150,220,', 0.09);\n      blob(w * (0.52 + 0.10 * Math.sin(t * 0.9)), h * (0.20 + 0.12 * Math.cos(t * 0.8)), w * 0.30, 'rgba(250,190,70,', 0.07);\n    }\n  }\n\n  setupReveals(reduce) {\n    document.querySelectorAll('[data-scroll]').forEach(container => {\n      const els = container.querySelectorAll('[data-reveal]');\n      if (reduce) { els.forEach(el => { el.style.opacity = '1'; el.style.transform = 'none'; }); return; }\n      const io = new IntersectionObserver(entries => {\n        entries.forEach(e => {\n          if (e.isIntersecting) {\n            const el = e.target;\n            const d = parseInt(el.getAttribute('data-delay') || '0', 10);\n            setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'none'; }, d);\n            io.unobserve(el);\n          }\n        });\n      }, { root: container, threshold: 0.12, rootMargin: '0px 0px -6% 0px' });\n      els.forEach(el => io.observe(el));\n    });\n  }\n\n  setupCounts(reduce) {\n    document.querySelectorAll('[data-s
